name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npx eslint src --max-warnings 0

      - name: Run code-health gate
        run: node .code-health/cli.js gate

      - name: Run tests
        run: npx vitest run --coverage
        if: always()

      - name: Generate dashboard
        run: node .code-health/cli.js dashboard -o ./docs/health-dashboard.html
        if: always()

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: |
            coverage/
            docs/health-dashboard.html
          if: always()
