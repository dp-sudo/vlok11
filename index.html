<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2306b6d4' stroke-width='2'><path d='M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z'></path><polyline points='3.27 6.96 12 12.01 20.73 6.96'></polyline><line x1='12' y1='22.08' x2='12' y2='12'></line></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b0b10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="AI驱动的2D到3D场景重建 - 使用React Three Fiber和TensorFlow.js" />
    <title>IMMERSA 3D // 场景重建系统</title>

    <!-- Performance: Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Exo 2 + Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet" />

    <style>
      /* CRITICAL BOOT STYLES - GPU OPTIMIZED */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      body {
        background-color: #050505;
        font-family: 'Exo 2', 'Consolas', 'Monaco', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      #root { height: 100%; }

      /* Boot Loader */
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%, #000000 100%);
        color: #06b6d4;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity;
      }
      #boot-loader.fade-out { opacity: 0; pointer-events: none; }

      /* Loader Rings */
      .loader-ring {
        position: relative;
        width: 100px;
        height: 100px;
      }
      .loader-ring span {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
      }
      .loader-ring .ring-1 {
        border-top-color: #06b6d4;
        border-right-color: rgba(6, 182, 212, 0.3);
        animation: spin-right 1s linear infinite;
      }
      .loader-ring .ring-2 {
        inset: 8px;
        border-bottom-color: #a78bfa;
        border-left-color: rgba(167, 139, 250, 0.2);
        animation: spin-left 2s linear infinite reverse;
      }
      .loader-ring .ring-3 {
        inset: 20px;
        border-color: rgba(34, 211, 238, 0.15);
        animation: pulse 2s ease-in-out infinite;
      }
      .loader-ring .core {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        background: #22d3ee;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 15px #22d3ee, 0 0 30px rgba(34, 211, 238, 0.5);
      }

      /* Loading Text */
      .loader-text {
        margin-top: 2rem;
        text-align: center;
      }
      .loader-text .main {
        font-family: 'Orbitron', monospace;
        font-size: 14px;
        letter-spacing: 4px;
        color: #22d3ee;
        text-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
      }
      .loader-text .sub {
        font-size: 11px;
        color: rgba(6, 182, 212, 0.5);
        letter-spacing: 2px;
        margin-top: 0.5rem;
      }

      /* Animations */
      @keyframes spin-right { to { transform: rotate(360deg); } }
      @keyframes spin-left { to { transform: rotate(-360deg); } }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.05); }
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .loader-ring span { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <!-- Boot Loader -->
    <div id="boot-loader">
      <div class="loader-ring">
        <span class="ring-1"></span>
        <span class="ring-2"></span>
        <span class="ring-3"></span>
        <span class="core"></span>
      </div>
      <div class="loader-text">
        <div class="main">系统初始化</div>
        <div class="sub">加载组件...</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Loader Cleanup -->
    <script>
      (function() {
        var cleanup = function() {
          var loader = document.getElementById('boot-loader');
          if (loader && !loader.classList.contains('fade-out')) {
            loader.classList.add('fade-out');
            setTimeout(function() { loader.remove(); }, 500);
          }
        };
        window.addEventListener('lifecycle:app:ready', cleanup);
        window.addEventListener('load', function() {
          setTimeout(cleanup, 300);
          setTimeout(cleanup, 5000); // Safety fallback
        });
      })();
    </script>
  </body>
</html>
