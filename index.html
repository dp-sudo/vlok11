    <title>IMMERSA 3D // SYSTEM</title>

    <style>
      /* CRITICAL BOOT STYLES - CYBERPUNK THEME - GPU OPTIMIZED */
      body {
        background-color: #050505;
        margin: 0;
        overflow: hidden;
        font-family: 'Consolas', 'Monaco', monospace;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        color: #06b6d4;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity;
      }

      /* Tech Rings Container */
      .loader-container {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Inner Ring - GPU accelerated */
      .ring-inner {
        position: absolute;
        width: 60px;
        height: 60px;
        border: 2px solid rgba(6, 182, 212, 0.3);
        border-top: 2px solid #06b6d4;
        border-radius: 50%;
        animation: spin-right 1.5s linear infinite;
        box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        will-change: transform;
      }

      /* Outer Ring */
      .ring-outer {
        position: absolute;
        width: 100px;
        height: 100px;
        border: 1px dashed rgba(6, 182, 212, 0.2);
        border-radius: 50%;
        animation: spin-left 4s linear infinite;
        will-change: transform;
      }

      /* Center Core */
      .core-gem {
        width: 8px;
        height: 8px;
        background: #22d3ee;
        border-radius: 50%;
        box-shadow: 0 0 20px #22d3ee;
        animation: pulse 2s ease-in-out infinite;
        will-change: transform, opacity;
      }

      /* Scanning Line */
      .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #06b6d4, transparent);
        top: 50%;
        animation: scan 3s ease-in-out infinite;
        opacity: 0.5;
        will-change: transform, opacity;
      }

      /* Text Styles */
      .boot-text {
        margin-top: 3rem;
        font-size: 14px;
        letter-spacing: 4px;
        color: #22d3ee;
        text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        position: relative;
      }

      .boot-text::before {
        content: '> ';
        opacity: 0.5;
      }

      .boot-sub {
        margin-top: 0.5rem;
        font-size: 10px;
        color: rgba(6, 182, 212, 0.5);
        letter-spacing: 1px;
      }

      /* Animations - Optimized */
      @keyframes spin-right {
        100% { transform: rotate(360deg); }
      }
      @keyframes spin-left {
        100% { transform: rotate(-360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.5); }
      }
      @keyframes scan {
        0% { top: 0%; opacity: 0; }
        50% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }

      /* Reduced motion support */
      @media (prefers-reduced-motion: reduce) {
        .ring-inner, .ring-outer, .core-gem, .scan-line {
          animation: none !important;
        }
        .core-gem {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <!-- SYSTEM BOOT LOADER -->
    <div id="boot-loader">
      <div class="loader-container">
        <div class="ring-outer"></div>
        <div class="ring-inner"></div>
        <div class="core-gem"></div>
        <div class="scan-line"></div>
      </div>
      <div class="boot-text">зі»з»ҹеҗҜеҠЁеҲқе§ӢеҢ–</div>
      <div class="boot-sub">еҠ иҪҪзҘһз»Ҹе…ғзҪ‘з»ңз»„д»¶...</div>
    </div>

    <div id="root">
      <!-- React Hydration Target -->
    </div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Loader Cleanup Script - Optimized -->
    <script>
      (function() {
        // Performance: Use requestIdleCallback when available, fallback to setTimeout
        var cleanup = function() {
          var loader = document.getElementById('boot-loader');
          if (loader) {
            // If app mounted successfully, remove immediately
            loader.style.opacity = '0';
            setTimeout(function() {
              loader.remove();
            }, 600);
          }
        };

        // Listen for React mount event (if available)
        window.addEventListener('lifecycle:app:ready', cleanup);

        // Fallback: Clean up after app load
        window.addEventListener('load', function() {
          setTimeout(cleanup, 100);
          // Safety timeout - force cleanup after 5s regardless
          setTimeout(function() {
            var loader = document.getElementById('boot-loader');
            if (loader) {
              loader.style.opacity = '0';
              setTimeout(function() {
                loader.remove();
              }, 600);
            }
          }, 5000);
        });
      })();
    </script>
  </body>
